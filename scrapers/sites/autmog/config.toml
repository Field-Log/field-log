# Autmog — currently-available collection on autmog.com (Shopify).
# Published at the site root (machinedpens.info/).
# [source] is read by core/shopify_archive.py; [deploy] by core/deploy.sh.
name = "autmog"
label = "Autmog"

[source]
collection_url = "https://www.autmog.com/collections/currently-available/products.json"
page_limit = 250       # products per page (Shopify max is 250)
max_pages = 20         # stop after this many pages (or the first empty one)
page_pause = 0.0       # seconds between page fetches
retries = 1            # attempts per request (autmog.com doesn't block direct IPs)
proxy_env = ""         # name of an env var holding a proxy URL; "" = direct connection
user_agent = "python-requests/2.33.1"

[deploy]
mode = "remote"        # remote = push via ssh/rsync (the Pi today) | local = copy into local_root (on Hostinger)
subdir = ""            # publish under <root>/<subdir>/ ; "" = the web root itself
remote_host = "autmog-hostinger"                       # ssh alias in ~/.ssh/config (used when mode = remote)
remote_root = "domains/machinedpens.info/public_html"  # remote web root
local_root = ""        # set when mode = local, e.g. /home/uXXXX/domains/machinedpens.info/public_html
