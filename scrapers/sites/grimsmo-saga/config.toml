# Grimsmo Saga — saga collection on grimsmoknives.com (Shopify).
# Published under machinedpens.info/grimsmo-saga/.
#
# Grimsmo persistently 403s some datacenter/shared IPs. Set the proxy env var
# named below on the host (e.g. a DataImpulse rotating endpoint) when the host's
# direct IP is blocked; leave it unset where the IP is fine (e.g. a dev Mac).
name = "grimsmo-saga"
label = "Grimsmo Saga"

[source]
collection_url = "https://grimsmoknives.com/collections/saga/products.json"
page_limit = 250
max_pages = 30         # Saga is large (5000+ items)
page_pause = 0.5       # gentle pacing — the rotating proxy hands out a new exit IP per connection
retries = 5            # retry with backoff around 403s / dropped proxy connections
proxy_env = "GRIMSMO_PROXY_URL"   # e.g. export GRIMSMO_PROXY_URL=http://user:pass@gw.dataimpulse.com:823
user_agent = "python-requests/2.33.1"

[deploy]
mode = "remote"
subdir = "grimsmo-saga"
remote_host = "autmog-hostinger"
remote_root = "domains/machinedpens.info/public_html"
local_root = ""
