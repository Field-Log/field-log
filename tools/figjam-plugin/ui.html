<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 13px;
        line-height: 1.45;
      }

      body {
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
        margin: 0;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      h1 {
        font-size: 15px;
        line-height: 1.25;
        margin: 0;
      }

      label {
        color: var(--figma-color-text-secondary);
        display: grid;
        font-size: 11px;
        font-weight: 600;
        gap: 6px;
        letter-spacing: 0.6px;
        text-transform: uppercase;
      }

      input,
      textarea {
        background: var(--figma-color-bg-secondary);
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        color: var(--figma-color-text);
        font: inherit;
        min-width: 0;
        padding: 8px 9px;
      }

      textarea {
        min-height: 128px;
        resize: vertical;
      }

      button {
        align-items: center;
        background: var(--figma-color-bg-brand);
        border: 1px solid var(--figma-color-border-brand);
        border-radius: 6px;
        color: var(--figma-color-text-onbrand);
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 600;
        justify-content: center;
        min-height: 34px;
        padding: 7px 10px;
      }

      button.secondary {
        background: var(--figma-color-bg-secondary);
        border-color: var(--figma-color-border);
        color: var(--figma-color-text);
      }

      .row {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr auto;
      }

      .payloads {
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        display: grid;
        max-height: 160px;
        overflow: auto;
      }

      .payload {
        align-items: start;
        background: transparent;
        border: 0;
        border-bottom: 1px solid var(--figma-color-border);
        border-radius: 0;
        color: var(--figma-color-text);
        display: grid;
        gap: 2px;
        justify-items: start;
        min-height: 0;
        padding: 9px;
        text-align: left;
      }

      .payload:last-child {
        border-bottom: 0;
      }

      .muted {
        color: var(--figma-color-text-secondary);
        font-size: 12px;
      }

      .status {
        background: var(--figma-color-bg-secondary);
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        min-height: 20px;
        padding: 8px 9px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Field Log FigJam Bridge</h1>

      <label>
        Bridge Origin
        <div class="row">
          <input id="origin" value="http://localhost:4873" />
          <button class="secondary" id="refresh" type="button">Refresh</button>
        </div>
      </label>

      <section class="payloads" id="payloads" aria-label="Pending payloads">
        <div class="muted" style="padding: 9px">No payloads loaded.</div>
      </section>

      <label>
        Paste Payload
        <textarea id="payload" spellcheck="false"></textarea>
      </label>

      <button id="apply" type="button">Apply Pasted Payload</button>
      <div class="status muted" id="status">Ready.</div>
    </main>

    <script>
      const originInput = document.getElementById("origin");
      const payloads = document.getElementById("payloads");
      const payloadInput = document.getElementById("payload");
      const status = document.getElementById("status");

      document.getElementById("refresh").onclick = refreshPayloads;
      document.getElementById("apply").onclick = () => {
        applyPayload(JSON.parse(payloadInput.value));
      };

      window.onmessage = async (event) => {
        const message = event.data.pluginMessage;
        if (message?.type !== "apply-result") {
          return;
        }

        if (message.error) {
          status.textContent = message.error;
          return;
        }

        status.textContent = `Applied ${message.result.createdCount} operations from ${message.result.payloadId}.`;
        await fetch(`${originInput.value}/ack`, {
          body: JSON.stringify(message.result),
          headers: { "Content-Type": "application/json" },
          method: "POST",
        }).catch(() => undefined);
      };

      async function refreshPayloads() {
        status.textContent = "Loading payloads...";
        const response = await fetch(`${originInput.value}/payloads`);
        const data = await response.json();
        payloads.innerHTML = "";

        for (const payload of data.payloads) {
          const button = document.createElement("button");
          button.className = "payload";
          button.innerHTML = `<strong>${payload.payloadId}</strong><span class="muted">${payload.source.agent} - ${payload.operationCount} operations - ${payload.fileKey}</span>`;
          button.onclick = async () => {
            const payloadResponse = await fetch(
              `${originInput.value}/payloads/${encodeURIComponent(payload.fileName)}`,
            );
            applyPayload(await payloadResponse.json());
          };
          payloads.appendChild(button);
        }

        if (data.payloads.length === 0) {
          payloads.innerHTML =
            '<div class="muted" style="padding: 9px">No pending payloads.</div>';
        }

        status.textContent = "Ready.";
      }

      function applyPayload(payload) {
        status.textContent = "Applying payload...";
        parent.postMessage(
          { pluginMessage: { payload, type: "apply-payload" } },
          "*",
        );
      }
    </script>
  </body>
</html>
