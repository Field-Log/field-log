name: Discord Notifications

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - converted_to_draft
      - synchronize
      - review_requested
      - review_request_removed
      - closed
  pull_request_review:
    types:
      - submitted
      - dismissed
  push:
    branches: [main]
  workflow_run:
    workflows: [CI, Logger Live]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    name: Notify Discord
    if: ${{ !((github.event_name == 'pull_request' || github.event_name == 'pull_request_review') && github.event.pull_request.head.repo.full_name != github.repository) && !(github.event_name == 'workflow_run' && github.event.workflow_run.head_repository.full_name != github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Infisical OIDC configuration
        shell: bash
        env:
          INFISICAL_DISCORD_NOTIFIER_IDENTITY_ID: ${{ vars.INFISICAL_DISCORD_NOTIFIER_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: |
          set -euo pipefail

          if [[ -z "${INFISICAL_DISCORD_NOTIFIER_IDENTITY_ID:-}" ]]; then
            echo "Repository variable INFISICAL_DISCORD_NOTIFIER_IDENTITY_ID is required." >&2
            exit 1
          fi

          if [[ -z "${INFISICAL_PROJECT_SLUG:-}" ]]; then
            echo "Repository variable INFISICAL_PROJECT_SLUG is required." >&2
            exit 1
          fi

      - name: Fetch Discord webhook from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_DISCORD_NOTIFIER_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG || 'dev' }}
          secret-path: /tools/github-discord-notifier

      - name: Send Discord notification
        run: pnpm --filter @package/github-discord-notifier notify
