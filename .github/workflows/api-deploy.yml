name: API Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - apps/api/**
      - packages/**
      - .github/scripts/**
      - .github/workflows/api-deploy.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
  push:
    branches: [main]
    paths:
      - apps/api/**
      - packages/**
      - .github/scripts/**
      - .github/workflows/api-deploy.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
  workflow_dispatch:

permissions:
  contents: read

env:
  API_PREVIEW_COMMENT_MARKER: "<!-- field-log-api-preview-app -->"
  DB_PREVIEW_COMMENT_MARKER: "<!-- field-log-db-preview -->"

jobs:
  preview:
    name: API Preview
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect database changes
        id: db_changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          database=false

          if grep -Eq '^(packages/database/src/schema/|packages/database/drizzle/|packages/database/drizzle\.config\.ts$|packages/database/package\.json$)' <<< "$changed_files"; then
            database=true
          fi

          echo "database=$database" >> "$GITHUB_OUTPUT"
          {
            echo "changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          jq -cn \
            --arg app "ci" \
            --arg environment "github-actions" \
            --arg level "info" \
            --arg message "ci.database.preview.changeDetection.completed" \
            --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --argjson database "$database" \
            --arg changed_files "$changed_files" \
            '{
              app: $app,
              environment: $environment,
              level: $level,
              message: $message,
              timestamp: $timestamp,
              attributes: {
                databaseChanged: $database,
                changedFiles: ($changed_files | split("\n") | map(select(. != "")))
              }
            }'

      - name: Sync db-change label
        uses: actions/github-script@v8
        env:
          DATABASE_CHANGED: ${{ steps.db_changes.outputs.database }}
        with:
          script: |
            const label = "db-change";
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            if (process.env.DATABASE_CHANGED === "true") {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: [label],
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: "0969da",
                  description: "Changes database schema or migrations",
                });
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: [label],
                });
              }
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            console.log(JSON.stringify({
              app: "ci",
              environment: "github-actions",
              level: "info",
              message: "ci.github.dbChangeLabel.synced",
              timestamp: new Date().toISOString(),
              attributes: {
                databaseChanged: process.env.DATABASE_CHANGED === "true",
                label,
                pullRequestNumber: String(issue_number),
              },
            }));

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate preview database configuration
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_DATABASE_NAME: ${{ vars.NEON_DATABASE_NAME }}
          NEON_DATABASE_USER: ${{ vars.NEON_DATABASE_USER }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          for name in NEON_API_KEY NEON_PROJECT_ID NEON_DATABASE_NAME NEON_DATABASE_USER VERCEL_TEAM_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is required." >&2
              exit 1
            fi
          done

      - name: Prepare Neon preview database
        id: db
        shell: bash
        env:
          DB_CHANGING: ${{ steps.db_changes.outputs.database }}
          MAX_NEON_BRANCHES: 10
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_DATABASE_NAME: ${{ vars.NEON_DATABASE_NAME }}
          NEON_DATABASE_USER: ${{ vars.NEON_DATABASE_USER }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/neon-database-branch.sh prepare-preview

      - name: Configure Vercel branch database override
        if: steps.db.outputs.can_deploy == 'true' && steps.db_changes.outputs.database == 'true'
        id: vercel
        shell: bash
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          DATABASE_URL: ${{ steps.db.outputs.database_url }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash .github/scripts/vercel-branch-database-url.sh set

      - name: Remove stale Vercel branch database override
        if: steps.db.outputs.can_deploy == 'true' && steps.db_changes.outputs.database != 'true'
        id: vercel_cleanup
        shell: bash
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash .github/scripts/vercel-branch-database-url.sh remove

      - name: Run migrations on Neon PR branch
        if: steps.db.outputs.can_deploy == 'true' && steps.db_changes.outputs.database == 'true'
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ steps.db.outputs.database_url }}
        run: |
          set -euo pipefail

          pnpm exec drizzle-kit migrate --config=drizzle.config.ts

          jq -cn \
            --arg app "ci" \
            --arg environment "github-actions" \
            --arg level "info" \
            --arg message "ci.database.preview.migrations.applied" \
            --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg branch_name "${{ steps.db.outputs.branch_name }}" \
            --arg branch_id "${{ steps.db.outputs.branch_id }}" \
            '{
              app: $app,
              environment: $environment,
              level: $level,
              message: $message,
              timestamp: $timestamp,
              attributes: {
                branchName: $branch_name,
                branchId: $branch_id
              }
            }'

      - name: Build Worker dependencies
        if: steps.db.outputs.can_deploy == 'true'
        run: pnpm exec turbo run build --filter=@app/api

      - name: Validate Infisical OIDC configuration
        if: steps.db.outputs.can_deploy == 'true'
        shell: bash
        env:
          INFISICAL_CLOUDFLARE_IDENTITY_ID: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: |
          set -euo pipefail

          if [[ -z "${INFISICAL_CLOUDFLARE_IDENTITY_ID:-}" ]]; then
            echo "Repository variable INFISICAL_CLOUDFLARE_IDENTITY_ID is required." >&2
            exit 1
          fi

          if [[ -z "${INFISICAL_PROJECT_SLUG:-}" ]]; then
            echo "Repository variable INFISICAL_PROJECT_SLUG is required." >&2
            exit 1
          fi

      - name: Fetch Cloudflare deploy secrets from Infisical
        if: steps.db.outputs.can_deploy == 'true'
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: preview
          secret-path: /tools/cloudflare

      - name: Fetch API runtime secrets from Infisical
        if: steps.db.outputs.can_deploy == 'true'
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: preview
          secret-path: /apps/api

      - name: Write API preview secrets file
        if: steps.db.outputs.can_deploy == 'true'
        shell: bash
        env:
          PREVIEW_DATABASE_URL: ${{ steps.db.outputs.database_url }}
        run: |
          set -euo pipefail

          jq -n \
            --arg DATABASE_URL "$PREVIEW_DATABASE_URL" \
            --arg AXIOM_TOKEN "${AXIOM_TOKEN:-}" \
            --arg AXIOM_DATASET "${AXIOM_DATASET:-}" \
            --arg AXIOM_EDGE_DOMAIN "${AXIOM_EDGE_DOMAIN:-}" \
            --arg LOG_LEVEL "${LOG_LEVEL:-}" \
            --arg LOGGER "${LOGGER:-}" \
            --arg LOG_PROXY_CLIENT_KEY "${LOG_PROXY_CLIENT_KEY:-}" \
            '{
              DATABASE_URL: $DATABASE_URL,
              AXIOM_TOKEN: $AXIOM_TOKEN,
              AXIOM_DATASET: $AXIOM_DATASET,
              AXIOM_EDGE_DOMAIN: $AXIOM_EDGE_DOMAIN,
              LOG_LEVEL: $LOG_LEVEL,
              LOGGER: $LOGGER,
              LOG_PROXY_CLIENT_KEY: $LOG_PROXY_CLIENT_KEY
            } | with_entries(select(.value != ""))' \
            > "$RUNNER_TEMP/api-preview-secrets.json"

      - name: Deploy PR preview Worker
        if: steps.db.outputs.can_deploy == 'true'
        id: deploy
        shell: bash
        env:
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          set +e
          upload_output="$(pnpm dlx wrangler versions upload \
            --config apps/api/wrangler.jsonc \
            --env preview \
            --preview-alias "$PREVIEW_ALIAS" \
            --secrets-file "$RUNNER_TEMP/api-preview-secrets.json" 2>&1)"
          upload_status=$?
          set -e

          printf '%s\n' "$upload_output"

          if [[ "$upload_status" -ne 0 ]]; then
            if [[ "$upload_output" != *"does not yet exist"* ]]; then
              exit "$upload_status"
            fi

            echo "Preview Worker does not exist yet; creating it with wrangler deploy."
            pnpm dlx wrangler deploy \
              --config apps/api/wrangler.jsonc \
              --env preview \
              --secrets-file "$RUNNER_TEMP/api-preview-secrets.json"

            set +e
            upload_output="$(pnpm dlx wrangler versions upload \
              --config apps/api/wrangler.jsonc \
              --env preview \
              --preview-alias "$PREVIEW_ALIAS" \
              --secrets-file "$RUNNER_TEMP/api-preview-secrets.json" 2>&1)"
            upload_status=$?
            set -e

            printf '%s\n' "$upload_output"

            if [[ "$upload_status" -ne 0 ]]; then
              exit "$upload_status"
            fi
          fi

          if [[ "$upload_output" =~ Version[[:space:]]Preview[[:space:]]Alias[[:space:]]URL:[[:space:]](https://[^[:space:]]+) ]]; then
            preview_url="${BASH_REMATCH[1]}"
          else
            echo "Wrangler did not print a Version Preview Alias URL for $PREVIEW_ALIAS." >&2
            exit 1
          fi

          echo "Deploying preview Worker anchor version so the latest Worker version is deployed."
          pnpm dlx wrangler deploy \
            --config apps/api/wrangler.jsonc \
            --env preview \
            --secrets-file "$RUNNER_TEMP/api-preview-secrets.json"

          echo "preview_alias=$PREVIEW_ALIAS" >> "$GITHUB_OUTPUT"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Smoke test PR preview Worker
        if: steps.db.outputs.can_deploy == 'true'
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        run: |
          set -euo pipefail

          curl --fail --retry 5 --retry-all-errors --retry-delay 3 "$PREVIEW_URL/api/v1/health"

      - name: Validate PR comment app configuration
        shell: bash
        env:
          FIELD_LOG_API_PREVIEW_APP_CLIENT_ID: ${{ vars.FIELD_LOG_API_PREVIEW_APP_CLIENT_ID }}
          FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY }}
          FIELD_LOG_DB_PREVIEW_APP_CLIENT_ID: ${{ vars.FIELD_LOG_DB_PREVIEW_APP_CLIENT_ID }}
          FIELD_LOG_DB_PREVIEW_APP_PRIVATE_KEY: ${{ secrets.FIELD_LOG_DB_PREVIEW_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for name in FIELD_LOG_API_PREVIEW_APP_CLIENT_ID FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY FIELD_LOG_DB_PREVIEW_APP_CLIENT_ID FIELD_LOG_DB_PREVIEW_APP_PRIVATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is required." >&2
              exit 1
            fi
          done

      - name: Create API preview comment app token
        if: steps.db.outputs.can_deploy == 'true'
        id: preview-comment-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FIELD_LOG_API_PREVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Comment on API preview
        if: steps.db.outputs.can_deploy == 'true'
        uses: actions/github-script@v8
        env:
          DATABASE_BRANCH_NAME: ${{ steps.db.outputs.branch_name }}
          DATABASE_ISOLATED: ${{ steps.db.outputs.isolated }}
          PREVIEW_ALIAS: ${{ steps.deploy.outputs.preview_alias }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          github-token: ${{ steps.preview-comment-token.outputs.token }}
          script: |
            const marker = process.env.API_PREVIEW_COMMENT_MARKER;
            const previewUrl = process.env.PREVIEW_URL;
            const healthUrl = `${previewUrl}/api/v1/health`;
            const databaseScope = process.env.DATABASE_ISOLATED === "true"
              ? `Neon branch \`${process.env.DATABASE_BRANCH_NAME}\``
              : "shared Neon staging branch";
            const body = [
              marker,
              "The latest API preview deployment for this pull request:",
              "",
              "| Project | Deployment | Actions | Database |",
              "| --- | --- | --- | --- |",
              `| field-log-api | Ready | [Preview](${previewUrl}), [Health](${healthUrl}) | ${databaseScope} |`,
              "",
              `Alias: \`${process.env.PREVIEW_ALIAS}\``,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Create DB preview comment app token
        id: db-preview-comment-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FIELD_LOG_DB_PREVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.FIELD_LOG_DB_PREVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Comment on blocked DB preview
        if: steps.db_changes.outputs.database == 'true' && steps.db.outputs.can_deploy != 'true'
        uses: actions/github-script@v8
        env:
          BRANCH_COUNT: ${{ steps.db.outputs.branch_count }}
          BRANCH_NAMES: ${{ steps.db.outputs.branch_names }}
          TARGET_BRANCH: ${{ steps.db.outputs.target_branch }}
        with:
          github-token: ${{ steps.db-preview-comment-token.outputs.token }}
          script: |
            const marker = process.env.DB_PREVIEW_COMMENT_MARKER;
            const branchNames = (process.env.BRANCH_NAMES || "")
              .split("\n")
              .filter(Boolean)
              .map((name) => `- \`${name}\``)
              .join("\n");
            const retryUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/api-deploy.yml`;
            const body = [
              marker,
              "DB-isolated preview creation is blocked because the Neon branch limit has been reached.",
              "",
              `Requested branch: \`${process.env.TARGET_BRANCH}\``,
              `Branch capacity: \`${process.env.BRANCH_COUNT}/10\``,
              "",
              "Active Neon branches:",
              branchNames || "- none reported",
              "",
              "Close stale DB-changing PRs or delete stale `preview-pr-*` branches, then push a new commit or rerun the API Deploy workflow.",
              "",
              `[Retry workflow](${retryUrl})`,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Comment on ready DB preview
        if: steps.db_changes.outputs.database == 'true' && steps.db.outputs.can_deploy == 'true'
        uses: actions/github-script@v8
        env:
          API_PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          BRANCH_NAME: ${{ steps.db.outputs.branch_name }}
          BRANCH_URL: ${{ steps.db.outputs.branch_url }}
          PARENT_BRANCH: ${{ steps.db.outputs.parent_branch }}
          WEB_PREVIEW_URL: ${{ steps.vercel.outputs.web_preview_url }}
        with:
          github-token: ${{ steps.db-preview-comment-token.outputs.token }}
          script: |
            const marker = process.env.DB_PREVIEW_COMMENT_MARKER;
            const webPreviewUrl = process.env.WEB_PREVIEW_URL;
            const webPreview = webPreviewUrl
              ? `[Preview](${webPreviewUrl})`
              : "Vercel preview URL not available to this workflow yet; the branch-specific env var is set for the next preview deployment.";
            const body = [
              marker,
              "DB-isolated preview is ready for this pull request.",
              "",
              "| Item | Value |",
              "| --- | --- |",
              `| Neon branch | [\`${process.env.BRANCH_NAME}\`](${process.env.BRANCH_URL}) |`,
              `| Parent branch | \`${process.env.PARENT_BRANCH}\` |`,
              "| Migration status | Committed Drizzle migrations applied |",
              `| API preview | [Preview](${process.env.API_PREVIEW_URL}) |`,
              `| Web preview | ${webPreview} |`,
              "",
              "The `preview-pr-*` branch and branch-specific Vercel `DATABASE_URL` are deleted when the PR closes or no longer contains DB changes.",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Cleanup failed DB preview resources
        if: ${{ always() && steps.db_changes.outputs.database == 'true' && steps.db.outcome != 'skipped' && (failure() || cancelled()) }}
        shell: bash
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_DATABASE_NAME: ${{ vars.NEON_DATABASE_NAME }}
          NEON_DATABASE_USER: ${{ vars.NEON_DATABASE_USER }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set +e

          bash .github/scripts/neon-database-branch.sh cleanup-preview
          neon_status=$?

          bash .github/scripts/vercel-branch-database-url.sh remove
          vercel_status=$?

          if [[ "$neon_status" -ne 0 || "$vercel_status" -ne 0 ]]; then
            echo "Preview cleanup encountered errors: neon=${neon_status}, vercel=${vercel_status}." >&2
          fi

          exit 0

  production:
    name: API Production
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve production database URL
        id: production_db
        shell: bash
        env:
          BRANCH_NAME: production
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_DATABASE_NAME: ${{ vars.NEON_DATABASE_NAME }}
          NEON_DATABASE_USER: ${{ vars.NEON_DATABASE_USER }}
        run: bash .github/scripts/neon-database-branch.sh branch-url

      - name: Run production migrations
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ steps.production_db.outputs.database_url }}
        run: |
          set -euo pipefail

          pnpm exec drizzle-kit migrate --config=drizzle.config.ts

          jq -cn \
            --arg app "ci" \
            --arg environment "github-actions" \
            --arg level "info" \
            --arg message "ci.database.production.migrations.applied" \
            --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg branch_name "${{ steps.production_db.outputs.branch_name }}" \
            --arg branch_id "${{ steps.production_db.outputs.branch_id }}" \
            '{
              app: $app,
              environment: $environment,
              level: $level,
              message: $message,
              timestamp: $timestamp,
              attributes: {
                branchName: $branch_name,
                branchId: $branch_id
              }
            }'

      - name: Build Worker dependencies
        run: pnpm exec turbo run build --filter=@app/api

      - name: Validate Infisical OIDC configuration
        shell: bash
        env:
          INFISICAL_CLOUDFLARE_IDENTITY_ID: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: |
          set -euo pipefail

          if [[ -z "${INFISICAL_CLOUDFLARE_IDENTITY_ID:-}" ]]; then
            echo "Repository variable INFISICAL_CLOUDFLARE_IDENTITY_ID is required." >&2
            exit 1
          fi

          if [[ -z "${INFISICAL_PROJECT_SLUG:-}" ]]; then
            echo "Repository variable INFISICAL_PROJECT_SLUG is required." >&2
            exit 1
          fi

      - name: Fetch Cloudflare deploy secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /tools/cloudflare

      - name: Fetch API runtime secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /apps/api

      - name: Write production API secrets file
        shell: bash
        env:
          PRODUCTION_DATABASE_URL: ${{ steps.production_db.outputs.database_url }}
        run: |
          set -euo pipefail

          jq -n \
            --arg DATABASE_URL "$PRODUCTION_DATABASE_URL" \
            --arg AXIOM_TOKEN "${AXIOM_TOKEN:-}" \
            --arg AXIOM_DATASET "${AXIOM_DATASET:-}" \
            --arg AXIOM_EDGE_DOMAIN "${AXIOM_EDGE_DOMAIN:-}" \
            --arg LOG_LEVEL "${LOG_LEVEL:-}" \
            --arg LOGGER "${LOGGER:-}" \
            --arg LOG_PROXY_CLIENT_KEY "${LOG_PROXY_CLIENT_KEY:-}" \
            '{
              DATABASE_URL: $DATABASE_URL,
              AXIOM_TOKEN: $AXIOM_TOKEN,
              AXIOM_DATASET: $AXIOM_DATASET,
              AXIOM_EDGE_DOMAIN: $AXIOM_EDGE_DOMAIN,
              LOG_LEVEL: $LOG_LEVEL,
              LOGGER: $LOGGER,
              LOG_PROXY_CLIENT_KEY: $LOG_PROXY_CLIENT_KEY
            } | with_entries(select(.value != ""))' \
            > "$RUNNER_TEMP/api-production-secrets.json"

      - name: Deploy production Worker
        run: pnpm dlx wrangler deploy --config apps/api/wrangler.jsonc --env="" --secrets-file "$RUNNER_TEMP/api-production-secrets.json"

      - name: Smoke test production Worker
        run: curl --fail --retry 5 --retry-all-errors --retry-delay 3 https://api.field-log.app/api/v1/health
