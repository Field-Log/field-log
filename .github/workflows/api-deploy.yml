name: API Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - apps/api/**
      - packages/**
      - .github/workflows/api-deploy.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
  push:
    branches: [main]
    paths:
      - apps/api/**
      - packages/**
      - .github/workflows/api-deploy.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
  workflow_dispatch:

permissions:
  contents: read

env:
  API_PREVIEW_COMMENT_MARKER: "<!-- field-log-api-preview -->"
  API_PREVIEW_WORKER_NAME: field-log-api-preview

jobs:
  preview:
    name: API Preview
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Worker dependencies
        run: pnpm exec turbo run build --filter=@app/api

      - name: Validate Infisical OIDC configuration
        shell: bash
        env:
          INFISICAL_CLOUDFLARE_IDENTITY_ID: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: |
          set -euo pipefail

          if [[ -z "${INFISICAL_CLOUDFLARE_IDENTITY_ID:-}" ]]; then
            echo "Repository variable INFISICAL_CLOUDFLARE_IDENTITY_ID is required." >&2
            exit 1
          fi

          if [[ -z "${INFISICAL_PROJECT_SLUG:-}" ]]; then
            echo "Repository variable INFISICAL_PROJECT_SLUG is required." >&2
            exit 1
          fi

      - name: Fetch Cloudflare deploy secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: preview
          secret-path: /tools/cloudflare

      - name: Deploy PR preview Worker
        id: deploy
        shell: bash
        env:
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_WORKERS_SUBDOMAIN:-}" ]]; then
            echo "CLOUDFLARE_WORKERS_SUBDOMAIN is required in Infisical /tools/cloudflare." >&2
            exit 1
          fi

          workers_subdomain="${CLOUDFLARE_WORKERS_SUBDOMAIN#https://}"
          workers_subdomain="${workers_subdomain#http://}"
          workers_subdomain="${workers_subdomain%%/*}"
          workers_subdomain="${workers_subdomain%.workers.dev}"

          if [[ -z "$workers_subdomain" || "$workers_subdomain" == *.* ]]; then
            echo "CLOUDFLARE_WORKERS_SUBDOMAIN must be the workers.dev account subdomain, for example 23242 or 23242.workers.dev." >&2
            exit 1
          fi

          set +e
          upload_output="$(pnpm dlx wrangler versions upload \
            --config apps/api/wrangler.jsonc \
            --env preview \
            --preview-alias "$PREVIEW_ALIAS" 2>&1)"
          upload_status=$?
          set -e

          printf '%s\n' "$upload_output"

          if [[ "$upload_status" -ne 0 ]]; then
            if [[ "$upload_output" != *"does not yet exist"* ]]; then
              exit "$upload_status"
            fi

            echo "Preview Worker does not exist yet; creating it with wrangler deploy."
            pnpm dlx wrangler deploy \
              --config apps/api/wrangler.jsonc \
              --env preview

            pnpm dlx wrangler versions upload \
              --config apps/api/wrangler.jsonc \
              --env preview \
              --preview-alias "$PREVIEW_ALIAS"
          fi

          preview_url="https://${PREVIEW_ALIAS}-${API_PREVIEW_WORKER_NAME}.${workers_subdomain}.workers.dev"
          echo "preview_alias=$PREVIEW_ALIAS" >> "$GITHUB_OUTPUT"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Smoke test PR preview Worker
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        run: |
          set -euo pipefail

          curl --fail --retry 5 --retry-delay 3 "$PREVIEW_URL/health"

      - name: Validate PR comment app configuration
        shell: bash
        env:
          FIELD_LOG_API_PREVIEW_APP_CLIENT_ID: ${{ vars.FIELD_LOG_API_PREVIEW_APP_CLIENT_ID }}
          FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${FIELD_LOG_API_PREVIEW_APP_CLIENT_ID:-}" ]]; then
            echo "Repository variable FIELD_LOG_API_PREVIEW_APP_CLIENT_ID is required." >&2
            exit 1
          fi

          if [[ -z "${FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY:-}" ]]; then
            echo "Repository secret FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY is required." >&2
            exit 1
          fi

      - name: Create PR comment app token
        id: preview-comment-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FIELD_LOG_API_PREVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-issues: write

      - name: Comment on pull request
        uses: actions/github-script@v8
        env:
          PREVIEW_ALIAS: ${{ steps.deploy.outputs.preview_alias }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          github-token: ${{ steps.preview-comment-token.outputs.token }}
          script: |
            const marker = process.env.API_PREVIEW_COMMENT_MARKER;
            const previewUrl = process.env.PREVIEW_URL;
            const healthUrl = `${previewUrl}/health`;
            const body = [
              marker,
              "The latest API preview deployment for this pull request:",
              "",
              "| Project | Deployment | Actions |",
              "| --- | --- | --- |",
              `| field-log-api | Ready | [Preview](${previewUrl}), [Health](${healthUrl}) |`,
              "",
              `Alias: \`${process.env.PREVIEW_ALIAS}\``,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  preview-closed:
    name: API Preview Closed
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Validate PR comment app configuration
        shell: bash
        env:
          FIELD_LOG_API_PREVIEW_APP_CLIENT_ID: ${{ vars.FIELD_LOG_API_PREVIEW_APP_CLIENT_ID }}
          FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${FIELD_LOG_API_PREVIEW_APP_CLIENT_ID:-}" ]]; then
            echo "Repository variable FIELD_LOG_API_PREVIEW_APP_CLIENT_ID is required." >&2
            exit 1
          fi

          if [[ -z "${FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY:-}" ]]; then
            echo "Repository secret FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY is required." >&2
            exit 1
          fi

      - name: Create PR comment app token
        id: preview-comment-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FIELD_LOG_API_PREVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-issues: write

      - name: Mark preview comment closed
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.preview-comment-token.outputs.token }}
          script: |
            const marker = process.env.API_PREVIEW_COMMENT_MARKER;
            const alias = `pr-${context.issue.number}`;
            const body = [
              marker,
              "The API preview for this pull request is no longer current because the pull request is closed.",
              "",
              `Alias: \`${alias}\``,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            }

  production:
    name: API Production
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Worker dependencies
        run: pnpm exec turbo run build --filter=@app/api

      - name: Validate Infisical OIDC configuration
        shell: bash
        env:
          INFISICAL_CLOUDFLARE_IDENTITY_ID: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: |
          set -euo pipefail

          if [[ -z "${INFISICAL_CLOUDFLARE_IDENTITY_ID:-}" ]]; then
            echo "Repository variable INFISICAL_CLOUDFLARE_IDENTITY_ID is required." >&2
            exit 1
          fi

          if [[ -z "${INFISICAL_PROJECT_SLUG:-}" ]]; then
            echo "Repository variable INFISICAL_PROJECT_SLUG is required." >&2
            exit 1
          fi

      - name: Fetch Cloudflare deploy secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /tools/cloudflare

      - name: Deploy production Worker
        run: pnpm dlx wrangler deploy --config apps/api/wrangler.jsonc --env=""

      - name: Smoke test production Worker
        run: curl --fail --retry 5 --retry-delay 3 https://api.field-log.app/health
