name: API Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

env:
  API_PREVIEW_COMMENT_MARKER: "<!-- field-log-api-preview-app -->"
  DB_PREVIEW_COMMENT_MARKER: "<!-- field-log-db-preview -->"

jobs:
  preview-closed:
    name: API Preview Closed
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Delete Neon PR branch
        id: neon_cleanup
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_DATABASE_NAME: ${{ secrets.NEON_DATABASE_NAME }}
          NEON_DATABASE_USER: ${{ secrets.NEON_DATABASE_USER }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/neon-database-branch.sh cleanup-preview

      - name: Remove Vercel branch database override
        id: vercel_cleanup
        shell: bash
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash .github/scripts/vercel-branch-database-url.sh remove

      - name: Remove Vercel branch image folder prefix
        shell: bash
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash .github/scripts/vercel-branch-database-url.sh remove-image-folder-prefix

      - name: Delete ImageKit PR preview folder
        id: image_kit_cleanup
        env:
          IMAGE_KIT_PRIVATE_KEY: ${{ secrets.IMAGE_KIT_PRIVATE_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: pnpm --filter @package/images run cleanup:preview-folder

      - name: Remove db-change label
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: "db-change",
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Validate PR comment app configuration
        shell: bash
        env:
          FIELD_LOG_API_PREVIEW_APP_CLIENT_ID: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_CLIENT_ID }}
          FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY }}
          FIELD_LOG_DB_PREVIEW_APP_CLIENT_ID: ${{ secrets.FIELD_LOG_DB_PREVIEW_APP_CLIENT_ID }}
          FIELD_LOG_DB_PREVIEW_APP_PRIVATE_KEY: ${{ secrets.FIELD_LOG_DB_PREVIEW_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for name in FIELD_LOG_API_PREVIEW_APP_CLIENT_ID FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY FIELD_LOG_DB_PREVIEW_APP_CLIENT_ID FIELD_LOG_DB_PREVIEW_APP_PRIVATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is required." >&2
              exit 1
            fi
          done

      - name: Create API preview comment app token
        id: preview-comment-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.FIELD_LOG_API_PREVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Mark API preview comment closed
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.preview-comment-token.outputs.token }}
          script: |
            const marker = process.env.API_PREVIEW_COMMENT_MARKER;
            const alias = `pr-${context.issue.number}`;
            const body = [
              marker,
              "The API preview for this pull request is no longer current because the pull request is closed.",
              "",
              `Alias: \`${alias}\``,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            }

      - name: Create DB preview comment app token
        id: db-preview-comment-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.FIELD_LOG_DB_PREVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.FIELD_LOG_DB_PREVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Mark DB preview comment closed
        uses: actions/github-script@v8
        env:
          CLEANUP_PERFORMED: ${{ steps.neon_cleanup.outputs.cleanup_performed }}
          IMAGE_KIT_CLEANUP_STATUS: ${{ steps.image_kit_cleanup.outputs.status }}
          IMAGE_KIT_FOLDER_PATH: ${{ steps.image_kit_cleanup.outputs.folder_path }}
          TARGET_BRANCH: ${{ steps.neon_cleanup.outputs.target_branch }}
        with:
          github-token: ${{ steps.db-preview-comment-token.outputs.token }}
          script: |
            const marker = process.env.DB_PREVIEW_COMMENT_MARKER;
            const cleanup = process.env.CLEANUP_PERFORMED === "true"
              ? "Deleted"
              : "No active branch found";
            const body = [
              marker,
              "The DB preview for this pull request is inactive because the pull request is closed.",
              "",
              `Neon cleanup: ${cleanup} for \`${process.env.TARGET_BRANCH}\``,
              `ImageKit cleanup: ${process.env.IMAGE_KIT_CLEANUP_STATUS} for \`${process.env.IMAGE_KIT_FOLDER_PATH}\``,
              "Vercel branch-specific `DATABASE_URL` and `IMAGE_KIT_FOLDER_PREFIX` cleanup was attempted.",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            }
