name: Staging Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: read
  id-token: write

jobs:
  refresh:
    name: Refresh Staging
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reset staging from production
        id: staging_db
        shell: bash
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_DATABASE_NAME: ${{ vars.NEON_DATABASE_NAME }}
          NEON_DATABASE_USER: ${{ vars.NEON_DATABASE_USER }}
        run: bash .github/scripts/neon-database-branch.sh refresh-staging

      - name: Run staging migrations
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ steps.staging_db.outputs.database_url }}
        run: |
          set -euo pipefail

          pnpm exec drizzle-kit migrate --config=drizzle.config.ts

          jq -cn \
            --arg app "ci" \
            --arg environment "github-actions" \
            --arg level "info" \
            --arg message "ci.database.staging.migrations.applied" \
            --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg branch_name "${{ steps.staging_db.outputs.branch_name }}" \
            --arg branch_id "${{ steps.staging_db.outputs.branch_id }}" \
            '{
              app: $app,
              environment: $environment,
              level: $level,
              message: $message,
              timestamp: $timestamp,
              attributes: {
                branchName: $branch_name,
                branchId: $branch_id
              }
            }'

      - name: Build Worker dependencies
        run: pnpm exec turbo run build --filter=@app/api

      - name: Validate Infisical OIDC configuration
        shell: bash
        env:
          INFISICAL_CLOUDFLARE_IDENTITY_ID: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
        run: |
          set -euo pipefail

          if [[ -z "${INFISICAL_CLOUDFLARE_IDENTITY_ID:-}" ]]; then
            echo "Repository variable INFISICAL_CLOUDFLARE_IDENTITY_ID is required." >&2
            exit 1
          fi

          if [[ -z "${INFISICAL_PROJECT_SLUG:-}" ]]; then
            echo "Repository variable INFISICAL_PROJECT_SLUG is required." >&2
            exit 1
          fi

      - name: Fetch Cloudflare deploy secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /tools/cloudflare

      - name: Fetch API runtime secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLOUDFLARE_IDENTITY_ID }}
          oidc-audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /apps/api

      - name: Write staging API secrets file
        shell: bash
        env:
          STAGING_DATABASE_URL: ${{ steps.staging_db.outputs.database_url }}
        run: |
          set -euo pipefail

          jq -n \
            --arg DATABASE_URL "$STAGING_DATABASE_URL" \
            --arg AXIOM_TOKEN "${AXIOM_TOKEN:-}" \
            --arg AXIOM_DATASET "${AXIOM_DATASET:-}" \
            --arg AXIOM_EDGE_DOMAIN "${AXIOM_EDGE_DOMAIN:-}" \
            --arg LOG_LEVEL "${LOG_LEVEL:-}" \
            --arg LOGGER "${LOGGER:-}" \
            --arg LOG_PROXY_CLIENT_KEY "${LOG_PROXY_CLIENT_KEY:-}" \
            '{
              DATABASE_URL: $DATABASE_URL,
              AXIOM_TOKEN: $AXIOM_TOKEN,
              AXIOM_DATASET: $AXIOM_DATASET,
              AXIOM_EDGE_DOMAIN: $AXIOM_EDGE_DOMAIN,
              LOG_LEVEL: $LOG_LEVEL,
              LOGGER: $LOGGER,
              LOG_PROXY_CLIENT_KEY: $LOG_PROXY_CLIENT_KEY
            } | with_entries(select(.value != ""))' \
            > "$RUNNER_TEMP/api-staging-secrets.json"

      - name: Deploy staging Worker
        run: pnpm dlx wrangler deploy --config apps/api/wrangler.jsonc --env staging --secrets-file "$RUNNER_TEMP/api-staging-secrets.json"

      - name: Smoke test staging Worker
        run: curl --fail --retry 5 --retry-all-errors --retry-delay 3 https://api.staging.field-log.app/api/v1/health
